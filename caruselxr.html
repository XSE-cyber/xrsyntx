<script>
(function() {
  const container = document.querySelector('#rec827850348 .carousel-container');
  const track = document.querySelector('#rec827850348 .carousel-track');
  const slides = document.querySelectorAll('#rec827850348 .carousel-slide');
  const videos = document.querySelectorAll('#rec827850348 video');
  
  let currentAngle = 0;
  let isAnimating = true;
  let isDragging = false;
  let startX = 0;
  let startAngle = 0;
  let rafId = null;

  const loadVideo = (video) => {
    if (!video.dataset.loaded) {
      video.load();
      video.playbackRate = 0.5;
      video.play().then(() => {
        video.classList.add('loaded');
        video.dataset.loaded = true;
      }).catch(() => {});
    }
  };

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const video = entry.target;
        loadVideo(video);
      }
    });
  }, { threshold: 0.1 });

  videos.forEach(video => observer.observe(video));

  function updateSlides() {
    const radius = window.innerWidth < 768 ? 300 : 600;
    const totalSlides = slides.length;
    const angleStep = (Math.PI * 2) / totalSlides;

    let closestSlide = null;
    let minAngleDiff = Infinity;

    slides.forEach((slide, index) => {
      const angle = currentAngle + (index * angleStep);
      const x = Math.sin(angle) * radius;
      const z = Math.cos(angle) * radius;

      const distanceFromFront = Math.abs(Math.cos(angle));
      const scale = 0.7 + (0.4 * (1 - distanceFromFront));

      // Определение центрального элемента
      const angleDiff = Math.abs(Math.sin(angle));
      if (angleDiff < minAngleDiff) {
        minAngleDiff = angleDiff;
        closestSlide = slide;
      }

      slide.style.transform = `translate3d(${x}px, 0, ${z}px) rotateY(${angle * (180 / Math.PI)}deg) scale(${scale})`;
      slide.style.zIndex = Math.round((1 - distanceFromFront) * 100);
    });

    // Устанавливаем прозрачность
    slides.forEach(slide => {
      slide.style.opacity = slide === closestSlide ? 1 : 0.4;
    });
  }

  function animate() {
    if (isAnimating && !isDragging) {
      currentAngle += 0.002;
    }
    updateSlides();
    rafId = requestAnimationFrame(animate);
  }

  const handleStart = (x) => {
    isDragging = true;
    startX = x;
    startAngle = currentAngle;
    container.style.cursor = 'grabbing';
  };

  const handleMove = (x) => {
    if (!isDragging) return;
    const dx = x - startX;
    currentAngle = startAngle + (dx * 0.005);
  };

  const handleEnd = () => {
    isDragging = false;
    container.style.cursor = 'grab';
  };

  container.addEventListener('mousedown', (e) => handleStart(e.clientX));
  window.addEventListener('mousemove', (e) => handleMove(e.clientX));
  window.addEventListener('mouseup', handleEnd);

  container.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX));
  container.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX));
  container.addEventListener('touchend', handleEnd);

  container.addEventListener('mouseenter', () => isAnimating = false);
  container.addEventListener('mouseleave', () => {
    isAnimating = true;
    isDragging = false;
  });

  window.addEventListener('beforeunload', () => {
    if (rafId) cancelAnimationFrame(rafId);
    observer.disconnect();
  });

  animate();
  updateSlides();
})();
</script>
